<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DeltaZero 控制台</title>
<style>
*{box-sizing:border-box}
body{font-family:"Segoe UI",Arial,sans-serif;margin:0;padding:16px 20px;background:#f0f2f5;color:#1a1a2e}
h1{margin:0 0 12px;font-size:22px}
.row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.card{background:#fff;border:1px solid #dde1ea;border-radius:10px;padding:14px 16px;flex:1;min-width:320px}
.card-title{font-weight:700;font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600;color:#fff}
.badge-ok{background:#16a34a}
.badge-down{background:#dc2626}
.kv{margin:3px 0;font-size:13px;line-height:1.6}
.kv .k{color:#64748b;display:inline-block;min-width:80px}
.kv .v{color:#1e293b}
.sep{border:none;border-top:1px solid #e5e7eb;margin:8px 0}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:6px 8px;background:#f8fafc;color:#64748b;font-weight:600;border-bottom:2px solid #e2e8f0}
td{padding:5px 8px;border-bottom:1px solid #f1f5f9}
label{display:inline-block;min-width:100px;font-size:13px;color:#475569}
input,select{padding:4px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px}
input[type=number]{width:80px}
button{padding:6px 14px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;transition:opacity .15s}
button:hover{opacity:.85}
button:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#2563eb;color:#fff}
.btn-danger{background:#dc2626;color:#fff}
.btn-secondary{background:#6b7280;color:#fff}
.btn-open{background:#7c3aed;color:#fff}
.btn-sm{padding:3px 10px;font-size:12px}
.progress-wrap{background:#e2e8f0;border-radius:8px;height:22px;overflow:hidden;margin:6px 0;position:relative}
.progress-bar{background:#2563eb;height:100%;border-radius:8px;transition:width .4s;min-width:0}
.progress-text{position:absolute;top:0;left:0;right:0;text-align:center;line-height:22px;font-size:12px;font-weight:600;color:#1e293b}
pre{background:#0f172a;color:#e2e8f0;padding:10px;border-radius:8px;max-height:120px;overflow:auto;font-size:12px;margin:6px 0 0}
.toast{position:fixed;top:16px;right:16px;padding:10px 18px;border-radius:8px;color:#fff;font-size:13px;z-index:999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast-ok{background:#16a34a}
.toast-err{background:#dc2626}
</style>
</head>
<body>

<h1>DeltaZero 控制台</h1>

<div class="card" style="margin-bottom:12px">
  <div class="kv"><span class="k">时间</span><span class="v" id="sTime">--</span></div>
  <div class="kv"><span class="k">快照</span><span class="v" id="sSnap">--</span></div>
  <div class="kv"><span class="k">今日分片</span><span class="v" id="sChunks">--</span></div>
</div>

<div class="row">
  <div class="card">
    <div class="card-title">盘前盘后任务</div>
    <div style="display:flex;gap:10px;margin-bottom:6px">
      <button class="btn-secondary" id="btnFetch" onclick="runFetch()">抓取今日期权链</button>
      <button class="btn-secondary" id="btnMerge" onclick="runMerge()">合并今日分片</button>
    </div>
    <div id="fetchProgress" style="display:none">
      <div class="progress-wrap">
        <div class="progress-bar" id="fetchBar" style="width:0%"></div>
        <div class="progress-text" id="fetchPct">0%</div>
      </div>
      <div class="kv" id="fetchStep" style="color:#64748b"></div>
    </div>
    <pre id="fetchLog" style="display:none"></pre>
    <pre id="mergeLog" style="display:none"></pre>
  </div>
  <div class="card">
    <div class="card-title">Recorder — 数据记录 <span id="recBadge"></span></div>
    <div id="recStatus">加载中...</div>
    <hr class="sep"/>
    <div id="recActions"></div>
  </div>
</div>

<div class="card" style="margin-bottom:12px">
  <div class="card-title">
    进程总览
    <span id="procCount" class="badge badge-ok">0</span>
    <span style="flex:1"></span>
    <button class="btn-danger btn-sm" onclick="killAll()">关闭所有进程</button>
  </div>
  <table>
    <thead><tr><th>类型</th><th>PID</th><th>参数</th><th>运行时长</th><th>操作</th></tr></thead>
    <tbody id="procBody"><tr><td colspan="5" style="color:#94a3b8">加载中...</td></tr></tbody>
  </table>
</div>

<div class="card">
  <div class="card-title">Monitor — 正向套利监控</div>
  <div style="display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center">
    <span class="kv" style="margin:0"><label style="min-width:auto;margin-right:4px">来源</label><select id="monSource" onchange="toggleZmq()" title="Wind 仅支持单实例"><option value="wind">wind</option><option value="zmq" selected>zmq</option></select></span>
    <span class="kv" style="margin:0"><label style="min-width:auto;margin-right:4px">利润≥</label><input id="monProfit" value="30" type="number" step="1" style="width:60px"/>元</span>
    <span class="kv" style="margin:0"><label style="min-width:auto;margin-right:4px">到期≤</label><input id="monExpiry" value="90" type="number" style="width:55px"/>天</span>
    <span class="kv" style="margin:0"><label style="min-width:auto;margin-right:4px">刷新</label><input id="monRefresh" value="3" type="number" style="width:45px"/>秒</span>
    <span class="kv" style="margin:0"><label style="min-width:auto;margin-right:4px">ATM</label><input id="monAtm" value="0.20" type="number" step="0.01" style="width:55px"/></span>
    <span id="zmqFields" style="display:none"><label style="min-width:auto;margin-right:4px">ZMQ端口</label><input id="monZmq" value="5555" type="number" style="width:60px"/></span>
    <button class="btn-primary" onclick="startMonitor()">启动 Monitor</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const POLL_MS = 3000;
let pollTimer = null;
let fetchPollTimer = null;
let marketDataDir = "";

function $(id){ return document.getElementById(id); }

function toast(msg, ok=true){
  const el = $("toast");
  el.className = "toast show " + (ok ? "toast-ok" : "toast-err");
  el.innerText = msg;
  setTimeout(()=> el.className = "toast", 2500);
}

async function api(url, method="GET", body=null){
  const opts = {method, headers:{"Content-Type":"application/json"}};
  if(body) opts.body = JSON.stringify(body);
  const resp = await fetch(url, opts);
  const data = await resp.json();
  if(!resp.ok) throw new Error(data.detail || JSON.stringify(data));
  return data;
}

function renderSnapshot(s){
  if(!s || s.status==="not_found") return "快照文件不存在（recorder 尚未写入）";
  if(s.status==="error") return s.text;
  let t = s.coverage;
  t += ` | 期权 ${s.n_options} 合约`;
  if(s.adj_count) t += `（调整型 ${s.adj_count}）`;
  t += ` | ETF ${s.n_etf} 条`;
  if(s.mtime) t += ` | 更新 ${s.mtime}（${s.mtime_age}）`;
  return t;
}

function renderChunks(c){
  if(!c) return "--";
  if(c.n_opt === 0 && c.n_etf === 0) return "暂无";
  let t = `期权 ${c.n_opt} 个  ETF ${c.n_etf} 个  共 ${c.total_mb} MB`;
  if(c.latest_time) t += `  最新 ${c.latest_time}`;
  return t;
}

function renderRecorder(st){
  const el = $("recStatus");
  const act = $("recActions");
  const badge = $("recBadge");
  if(st.recorder_running){
    const rec = st.processes.find(p => p.kind === "recorder");
    badge.className = "badge badge-ok";
    badge.innerText = "运行中";
    let html = `<div class="kv"><span class="k">状态</span><span class="v" style="color:#16a34a;font-weight:700">● 运行中  PID ${rec.pid}  已运行 ${rec.uptime}</span></div>`;
    if(st.recorder_count > 1){
      html += `<div class="kv" style="color:#d97706;font-weight:600">⚠ 检测到 ${st.recorder_count} 个 Recorder 实例！</div>`;
    }
    const s = st.snapshot;
    if(s && s.status === "ok"){
      html += `<div class="kv"><span class="k">品种覆盖</span><span class="v">${s.coverage}</span></div>`;
      let optLine = `${s.n_options} 合约`;
      if(s.adj_count) optLine += `  其中调整型 ${s.adj_count}`;
      html += `<div class="kv"><span class="k">期权快照</span><span class="v">${optLine}</span></div>`;
      html += `<div class="kv"><span class="k">ETF 快照</span><span class="v">${s.n_etf} 条</span></div>`;
      if(s.mtime) html += `<div class="kv"><span class="k">快照更新</span><span class="v">${s.mtime}（${s.mtime_age}）</span></div>`;
    }
    const c = st.chunks;
    if(c && (c.n_opt > 0 || c.n_etf > 0)){
      let chk = `期权 ${c.n_opt} 个  ETF ${c.n_etf} 个  共 ${c.total_mb} MB`;
      if(c.latest_time) chk += `  最新 ${c.latest_time}`;
      html += `<div class="kv"><span class="k">今日分片</span><span class="v">${chk}</span></div>`;
    }
    el.innerHTML = html;
    act.innerHTML = ``;
  } else {
    badge.className = "badge badge-down";
    badge.innerText = "未运行";
    el.innerHTML = `<div class="kv"><span class="k">状态</span><span class="v" style="color:#dc2626;font-weight:700">● 未运行</span></div>`;
    act.innerHTML = `<button class="btn-primary btn-sm" onclick="startRecorder()">启动 Recorder</button>`;
  }
}

function renderProcessTable(procs){
  const body = $("procBody");
  $("procCount").innerText = procs.length;
  if(procs.length === 0){
    $("procCount").className = "badge";
    $("procCount").style.cssText = "background:#94a3b8";
    body.innerHTML = `<tr><td colspan="5" style="color:#94a3b8">无运行中的进程</td></tr>`;
    return;
  }
  $("procCount").className = "badge badge-ok";
  $("procCount").style.cssText = "";
  const kindLabel = {recorder:"Recorder", monitor:"Monitor"};
  const kindColor = {recorder:"#2563eb", monitor:"#16a34a"};
  body.innerHTML = procs.map(p =>
    `<tr>
      <td><span style="color:${kindColor[p.kind]||'#333'};font-weight:600">${kindLabel[p.kind]||p.kind}</span></td>
      <td>${p.pid}</td>
      <td style="color:#475569">${p.params}</td>
      <td>${p.uptime}</td>
      <td>
        <button class="btn-open btn-sm" onclick="reopenPid(${p.pid})" title="关闭并在新窗口重开">重开窗口</button>
        <button class="btn-danger btn-sm" onclick="killPid(${p.pid})">关闭</button>
      </td>
    </tr>`
  ).join("");
}

async function refresh(){
  try{
    const st = await api("/api/state");
    marketDataDir = st.market_data_dir || marketDataDir;
    $("sTime").innerText = st.server_time;
    $("sSnap").innerText = renderSnapshot(st.snapshot);
    $("sChunks").innerText = renderChunks(st.chunks);
    renderRecorder(st);
    renderProcessTable(st.processes);
  } catch(e){ console.error(e); }
}

async function killPid(pid){
  if(!confirm("确认关闭 PID "+pid+"?")) return;
  try{ await api(`/api/processes/${pid}/kill`,"POST"); toast("已关闭 PID "+pid); }
  catch(e){ toast(e.message, false); }
  await refresh();
}

async function reopenPid(pid){
  if(!confirm("将关闭 PID "+pid+" 并在新窗口重新启动，确认？")) return;
  try{
    const r = await api(`/api/processes/${pid}/reopen`,"POST");
    toast("已重开窗口，新 PID "+r.started.pid);
  } catch(e){ toast(e.message, false); }
  setTimeout(refresh, 1500);
}

async function killAll(){
  if(!confirm("确认关闭所有 Recorder 和 Monitor 进程？")) return;
  try{
    const r = await api("/api/processes/kill-all","POST");
    toast(`已关闭 ${r.killed.length} 个进程`);
  } catch(e){ toast(e.message, false); }
  await refresh();
}

async function startRecorder(){
  try{
    const r = await api("/api/processes/recorder/start","POST");
    toast("Recorder 已启动 PID "+r.started.pid);
  } catch(e){ toast(e.message, false); }
  setTimeout(refresh, 1500);
}

function toggleZmq(){
  $("zmqFields").style.display = $("monSource").value==="zmq" ? "block" : "none";
}

async function startMonitor(){
  const body = {
    source: $("monSource").value,
    min_profit: parseFloat($("monProfit").value),
    expiry_days: parseInt($("monExpiry").value),
    refresh: parseInt($("monRefresh").value),
    atm_range: parseFloat($("monAtm").value),
    zmq_port: parseInt($("monZmq").value),
    snapshot_dir: marketDataDir
  };
  try{
    const r = await api("/api/processes/monitor/start","POST",body);
    toast("Monitor 已启动 PID "+r.started.pid);
  } catch(e){ toast(e.message, false); }
  setTimeout(refresh, 1500);
}

async function runFetch(){
  $("btnFetch").disabled = true;
  $("fetchProgress").style.display = "block";
  $("fetchLog").style.display = "none";
  $("fetchBar").style.width = "5%";
  $("fetchPct").innerText = "连接 Wind...";
  $("fetchStep").innerText = "";

  try{ await api("/api/actions/fetch-optionchain","POST"); }
  catch(e){ toast(e.message, false); $("btnFetch").disabled = false; return; }

  if(fetchPollTimer) clearInterval(fetchPollTimer);
  fetchPollTimer = setInterval(pollFetchStatus, 600);
}

async function pollFetchStatus(){
  try{
    const st = await api("/api/actions/fetch-status");
    const total = st.total || 3;
    const step = st.step || 0;
    const pct = st.done ? 100 : Math.min(Math.round((step / total) * 100), 95);
    $("fetchBar").style.width = pct + "%";
    if(st.done){
      $("fetchPct").innerText = "100%";
      $("fetchBar").style.width = "100%";
      $("fetchBar").style.background = st.ok ? "#16a34a" : "#dc2626";
    } else {
      $("fetchPct").innerText = `${step}/${total}`;
    }
    if(st.current && st.current !== "done"){
      $("fetchStep").innerText = `正在抓取 ${st.current} ...`;
    } else if(st.done){
      $("fetchStep").innerText = st.ok ? "抓取完成" : "抓取失败";
    }
    if(st.done){
      clearInterval(fetchPollTimer);
      fetchPollTimer = null;
      $("btnFetch").disabled = false;
      if(st.output){
        $("fetchLog").style.display = "block";
        $("fetchLog").innerText = st.output;
      }
      toast(st.ok ? "期权链抓取完成" : "期权链抓取失败", st.ok);
      await refresh();
    }
  } catch(e){ console.error(e); }
}

async function runMerge(){
  $("btnMerge").disabled = true;
  $("mergeLog").style.display = "block";
  $("mergeLog").innerText = "正在合并今日分片...";
  try{
    const r = await api("/api/actions/merge","POST");
    $("mergeLog").innerText = (r.ok ? "✓ 成功\n" : "✗ 失败\n") + (r.output || "");
    toast(r.ok ? "分片合并完成" : "合并失败", r.ok);
  } catch(e){
    $("mergeLog").innerText = "错误: "+e.message;
    toast(e.message, false);
  }
  $("btnMerge").disabled = false;
  await refresh();
}

toggleZmq();
refresh();
pollTimer = setInterval(refresh, POLL_MS);
</script>
</body>
</html>
